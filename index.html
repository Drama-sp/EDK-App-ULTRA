<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDK APP ULTRA Pro - v8.3 Sonic Rebound</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="edkultra.svg">
    <link rel="apple-touch-icon" href="edkultra.svg">
    
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.fb = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot, collection, query, addDoc, serverTimestamp };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --gloss-angle: 135deg;
            --dynamic-rgb: #00d2ff;
            --rgb-values: 0, 210, 255;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
        }

        /* --- CHASIS ADAPTATIVO MAESTRO --- */
        .app-container { 
            position: relative; 
            width: 100vw; height: 100dvh;
            background-color: #020617; 
            overflow: hidden; 
            display: flex; flex-direction: column; 
            border: 8px solid transparent;
            border-radius: 2.2rem;
            background-image: linear-gradient(#020617, #020617), 
                              linear-gradient(var(--gloss-angle), #8a6d3b 0%, #f1d382 25%, #ffffff 50%, #f1d382 75%, #8a6d3b 100%);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
            transition: background-image 0.5s ease-out;
        }

        @media (min-width: 1024px) {
            .app-container { max-width: 395px; max-height: 854px; border-width: 10px; border-radius: 3.5rem; }
        }

        .border-pulse-active {
            animation: border-glow-pulse 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            background-image: linear-gradient(#020617, #020617), 
                              linear-gradient(var(--gloss-angle), var(--dynamic-rgb) 0%, #ffffff 40%, var(--dynamic-rgb) 60%, #ffffff 100%) !important;
        }

        @keyframes border-glow-pulse {
            0% { filter: brightness(1); box-shadow: 0 0 10px rgba(var(--rgb-values), 0.2); }
            30% { filter: brightness(2.5); box-shadow: 0 0 40px rgba(var(--rgb-values), 0.8); }
            100% { filter: brightness(1); box-shadow: 0 0 10px rgba(var(--rgb-values), 0.2); }
        }

        .laser-engraving-label {
            position: absolute; left: -4px; top: 50%; transform: translateY(-50%) rotate(-90deg);
            font-family: 'JetBrains Mono', monospace; font-size: 6px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.1);
            pointer-events: none; z-index: 5; white-space: nowrap;
        }

        /* --- MÓDULO TÁCTICO UNIFICADO (420px height) --- */
        .tactical-module {
            width: 100%; height: 420px; 
            background: rgba(0, 0, 0, 0.7); 
            border: 1.5px solid var(--dynamic-rgb);
            box-shadow: 0 0 25px rgba(var(--rgb-values), 0.2), inset 0 0 15px rgba(var(--rgb-values), 0.05);
            border-radius: 2.2rem;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            transition: all 0.4s ease;
        }

        .module-scroll-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
            padding: 1.25rem; touch-action: pan-y;
        }
        .module-scroll-area::-webkit-scrollbar { display: none; }

        .main-scroll-viewport { flex: 1; overflow: hidden; position: relative; z-index: 10; display: flex; flex-direction: column; }
        .content-padding { flex: 1; padding: 1.25rem; display: flex; flex-direction: column; justify-content: center; }

        .lock-screen-overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(40px);
            z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .nav-dock-container {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, #020617 95%, transparent);
            padding: 8px 0 24px 0; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center;
        }
        .nav-row { display: flex; justify-content: space-around; width: 100%; padding: 0 0.5rem; }
        
        .nav-btn-wrapper {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(35px); border-radius: 1.1rem; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer;
        }
        .nav-btn-wrapper.active { background: white; transform: translateY(-3px) scale(1.1); box-shadow: 0 0 15px var(--dynamic-rgb); }
        .nav-btn-wrapper.active svg { stroke: black; fill: transparent; }

        .tactical-row { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px; width: 100%; }
        
        .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 2.8rem; font-weight: 800; color: var(--dynamic-rgb); text-shadow: 0 0 20px rgba(var(--rgb-values), 0.5); }
        .custom-msg-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; font-size: 10px; font-weight: bold; color: white; outline: none; margin-bottom: 12px; }

        .tamper-alert { position: fixed; inset: 0; background: #7f1d1d; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .vault-lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; z-index: 50; }
        .electric-laser { position: absolute; left: 0; width: 100%; height: 2px; background: var(--dynamic-rgb); box-shadow: 0 0 10px var(--dynamic-rgb); animation: scan-move 2s linear infinite; z-index: 2; }
        @keyframes scan-move { 0% { top: 0%; } 100% { top: 100%; } }

        .vip-card-mockup { width: 100%; aspect-ratio: 1.58/1; border-radius: 1.4rem; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 1.25rem; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .material-metal { background: linear-gradient(135deg, #1f2937 0%, #000 100%); border: 1px solid rgba(255,255,255,0.2); }
        .card-shine { position: absolute; inset: -100%; background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%); animation: card-glide 5s infinite linear; }
        @keyframes card-glide { from { transform: translateX(-30%); } to { transform: translateX(30%); } }
        
        .camera-feed { width: 100%; height: 100%; object-fit: cover; }
        .filter-button { padding: 4px 10px; border-radius: 6px; font-size: 6px; font-weight: 900; text-transform: uppercase; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
        .filter-button.active { background: var(--dynamic-rgb); color: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", color = "currentColor" }) => {
            const icons = {
                home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                id: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM4 8v10h16V8H4z" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
                cpu: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM9 9h6v6H9V9z" />,
                camera: <React.Fragment><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></React.Fragment>,
                lock: <path d="M7 11V7a5 5 0 0 1 10 0v4M3 11h18v11H3z" />,
                bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />,
                info: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01" /></React.Fragment>,
                pen: <path d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-1.5M2 22h5l11-11-5-5L2 17v5z" />,
                bolt: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></React.Fragment>,
                terminal: <path d="M4 17l6-6-6-6M12 19h8" />,
                shieldAlert: <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/></React.Fragment>,
                fingerprint: <path d="M2 12a10 10 0 0 1 20 0M7 12a5 5 0 0 1 10 0" />,
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
                palette: <React.Fragment><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.5 2-1.2"/></React.Fragment>,
                creditCard: <path d="M2 5h20v14H2zM2 10h20" />,
                roblox_verified: <React.Fragment>
                    <path d="M4.332 7.002L13.332 3.002C14.444 2.508 15.753 3.004 16.257 4.11L20.257 13.11C20.761 14.216 20.265 15.525 19.159 16.029L10.159 20.029C9.053 20.533 7.744 20.037 7.24 18.931L3.24 9.931C2.736 8.825 3.232 7.516 4.332 7.002Z" fill="#0084ff" />
                    <path d="M8.5 12L10.5 14L15.5 9" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                </React.Fragment>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke={name === 'roblox_verified' ? 'none' : color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || <circle cx="12" cy="12" r="5" />}</svg>;
        };

        const App = () => {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = fb.initializeApp(firebaseConfig);
            const auth = fb.getAuth(app);
            const db = fb.getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'edk-ultra-v83';

            // --- ESTADOS ---
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [isOwner, setIsOwner] = useState(false);
            const [isPulseActive, setIsPulseActive] = useState(false);
            const [dynamicColor, setDynamicColor] = useState(() => localStorage.getItem('edk_rgb') || '#00d2ff');
            const [engravedName, setEngravedName] = useState(() => localStorage.getItem('edk_laser') || 'AGENTE EDK');
            const [showLoginModal, setShowLoginModal] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [isLockedScreen, setIsLockedScreen] = useState(false);
            const [tamperDetected, setTamperDetected] = useState(false);
            const [isVaultUnlocked, setIsVaultUnlocked] = useState(false);
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [intrusions, setIntrusions] = useState([]);
            const [timeLeft, setTimeLeft] = useState(0);
            const [timerActive, setTimerActive] = useState(false);
            const [timerMsg, setTimerMsg] = useState('SE ACABÓ EL TIEMPO');
            const [flashlightColor, setFlashlightColor] = useState('#ffffff');
            const [torchOn, setTorchOn] = useState(false);
            const [activeFilter, setActiveFilter] = useState('none');
            const [cardMaterial, setCardMaterial] = useState('metal');
            const [currentTime, setCurrentTime] = useState(new Date());

            const qrRef = useRef(null);
            const audioCtx = useRef(null);
            const scanTimerRef = useRef(null);
            const videoRef = useRef(null);

            // --- MOTOR SÓNICO REBOUND (iPhone 15 Style) ---
            const playReboundTone = () => {
                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                
                const playNote = (freq, startTime, duration) => {
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };

                const now = audioCtx.current.currentTime;
                // Patrón Rebound: Dos pulsos elásticos
                playNote(1046.50, now, 0.4); // C6
                playNote(1318.51, now + 0.12, 0.5); // E6
            };

            const playTacticalSound = (freq = 200, duration = 0.1) => {
                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                const osc = audioCtx.current.createOscillator();
                const gain = audioCtx.current.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.current.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.current.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.current.destination);
                osc.start(); osc.stop(audioCtx.current.currentTime + duration);
            };

            const triggerOwnerNotification = (title, body) => {
                if (Notification.permission === "granted") {
                    new Notification(title.toUpperCase(), {
                        body: body,
                        icon: "edkultra.svg"
                    });
                }
                playReboundTone(); // Activamos el tono iPhone 15
            };

            const logIntrusion = async (type) => {
                if (!user || isOwner) return;
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'intrusions'), {
                        type,
                        timestamp: fb.serverTimestamp(),
                        device: navigator.userAgent.split(')')[0] + ')',
                    });
                    triggerOwnerNotification("BREACH DETECTED", `Amenaza de sistema: ${type}`);
                    setTamperDetected(true);
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await fb.signInWithCustomToken(auth, __initial_auth_token);
                    } else { await fb.signInAnonymously(auth); }
                };
                initAuth();
                const unsubscribe = fb.onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = fb.collection(db, 'artifacts', appId, 'public', 'data', 'intrusions');
                const unsubscribe = fb.onSnapshot(fb.query(q), (snapshot) => {
                    const logs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setIntrusions(logs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (isOwner) return;
                    const isForbidden = (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)));
                    if (isForbidden) { e.preventDefault(); logIntrusion("ACCESO_RECURSOS"); }
                };
                window.addEventListener('keydown', handleKey);
                document.addEventListener('contextmenu', (e) => { if (!isOwner) { e.preventDefault(); logIntrusion("RIGHT_CLICK"); } });
                const clock = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { window.removeEventListener('keydown', handleKey); clearInterval(clock); };
            }, [user, isOwner]);

            useEffect(() => {
                const handleMotion = (e) => {
                    if (e.accelerationIncludingGravity && Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2) > 28) {
                        if (activeTab === 'vault') { playTacticalSound(800, 0.3); setIsVaultUnlocked(true); }
                    }
                };
                window.addEventListener('devicemotion', handleMotion);
                return () => window.removeEventListener('devicemotion', handleMotion);
            }, [activeTab]);

            useEffect(() => {
                if (timerActive && timeLeft > 0) {
                    const t = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                    return () => clearInterval(t);
                } else if (timeLeft === 0 && timerActive) {
                    setTimerActive(false);
                    triggerOwnerNotification("SE ACABÓ EL TIEMPO", timerMsg);
                }
            }, [timerActive, timeLeft, timerMsg]);

            useEffect(() => {
                if (activeTab === 'home' && qrRef.current && !showLoginModal) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: window.location.href, width: 130, height: 130 });
                }
            }, [activeTab, showLoginModal]);

            useEffect(() => {
                document.documentElement.style.setProperty('--dynamic-rgb', dynamicColor);
                const r = parseInt(dynamicColor.slice(1,3), 16), g = parseInt(dynamicColor.slice(3,5), 16), b = parseInt(dynamicColor.slice(5,7), 16);
                document.documentElement.style.setProperty('--rgb-values', `${r}, ${g}, ${b}`);
            }, [dynamicColor]);

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setIsPulseActive(true);
                setTimeout(() => setIsPulseActive(false), 700);
            };

            const togglePhysicalTorch = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    const track = stream.getVideoTracks()[0];
                    if (track.getCapabilities().torch) {
                        await track.applyConstraints({ advanced: [{ torch: !torchOn }] });
                        setTorchOn(!torchOn);
                        playTacticalSound(800, 0.1);
                    }
                } catch (e) { console.error(e); }
            };

            if (tamperDetected) {
                return (
                    <div className="tamper-alert font-black">
                        <Icon name="shieldAlert" className="w-20 h-20 mb-6 animate-bounce text-white" />
                        <h1 className="text-3xl uppercase italic text-white px-4 text-center">BREACH DETECTED</h1>
                        <p className="text-[8px] text-white/50 uppercase mt-4 text-center px-8">Notificación enviada al dispositivo del Owner con tono Rebound.</p>
                        <button onClick={() => setTamperDetected(false)} className="mt-12 px-10 py-4 bg-white text-red-800 rounded-2xl font-black uppercase text-xs">Reset Kernel</button>
                    </div>
                );
            }

            if (showLoginModal) {
                return (
                    <div className="app-container mx-auto">
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-3xl">
                            <div className="tactical-module w-full max-w-[320px] h-auto p-8 text-center space-y-6 border-white/20 animate-in">
                                <img src="edkultra.svg" className="w-16 h-16 mx-auto" alt="Logo" />
                                <h2 className="text-xl font-black uppercase italic tracking-tighter">Terminal EDK</h2>
                                <input type="password" placeholder="Passphrase..." value={passInput} onChange={(e) => setPassInput(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 font-mono text-center text-white outline-none focus:border-blue-500" />
                                <button onClick={() => { if(passInput === '1234') setIsOwner(true); setShowLoginModal(false); }} className="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase shadow-2xl">Validar</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`app-container animate-in no-select ${isPulseActive ? 'border-pulse-active' : ''}`}>
                    <div className="laser-engraving-label">{engravedName} // SONIC-REBOUND-V8.3</div>

                    {isLockedScreen && (
                        <div className="lock-screen-overlay" onClick={() => { setIsLockedScreen(false); playTacticalSound(300, 0.2); }}>
                            <h2 className="text-5xl font-black italic tracking-tighter mb-2">{currentTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</h2>
                            <p className="text-[10px] font-bold uppercase opacity-40 mb-12">EDK Satellite Protection</p>
                            <div className="mt-auto mb-16 animate-pulse"><Icon name="fingerprint" className="w-12 h-12 opacity-20" /><p className="text-[7px] font-black uppercase mt-2">Identificar</p></div>
                        </div>
                    )}

                    <header className="h-20 bg-slate-950/80 backdrop-blur-xl flex items-center justify-between px-6 pt-4 border-b border-white/5 flex-shrink-0">
                        <div><p className="text-[7px] font-black uppercase tracking-widest text-white/30">Total Density OS</p><h1 className="text-md font-extrabold italic uppercase leading-none">EDK ULTRA</h1></div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsLockedScreen(true)} className="opacity-30 active:scale-95"><Icon name="lock" className="w-4 h-4" /></button>
                            <img src="edkultra.svg" className="w-8 h-8 rounded-lg shadow-xl" style={{ filter: `drop-shadow(0 0 10px ${dynamicColor})` }} alt="Logo" />
                        </div>
                    </header>

                    <main className="main-scroll-viewport">
                        <div className="content-padding">
                            <h2 className="text-lg font-black italic uppercase mb-4 flex items-center gap-2">
                                <Icon name={activeTab === 'ranking' ? 'roblox_verified' : (activeTab === 'sentinel' ? 'shieldAlert' : 'cpu')} color={dynamicColor} />
                                {activeTab.toUpperCase()}
                            </h2>

                            <div className="tactical-module">
                                {activeTab === 'home' && (
                                    <div className="module-scroll-area flex flex-col items-center space-y-6 animate-in">
                                        <div className="bg-gradient-to-br from-slate-900 to-black p-8 rounded-3xl border border-white/5 shadow-xl w-full text-center">
                                            <h2 className="text-2xl font-black italic uppercase leading-tight">SONIC <br/> <span style={{ color: dynamicColor }}>PROFILE</span></h2>
                                            <p className="text-[9px] opacity-40 uppercase font-mono mt-2">{currentTime.toLocaleTimeString()}</p>
                                        </div>
                                        <div className="p-2 bg-white rounded-xl shadow-xl mx-auto"><div id="share-qr" ref={qrRef}></div></div>
                                        <div className="tactical-row"><Icon name="activity" className="text-green-400" /> <span className="text-[9px] font-bold uppercase">Audio: iPhone 15 Rebound Sync</span></div>
                                    </div>
                                )}

                                {activeTab === 'ranking' && (
                                    <div className="module-scroll-area animate-in">
                                        <div className="space-y-1">
                                            {[1,2,3,5,10,15,20,25,30].map(i => (
                                                <div key={i} className="tactical-row">
                                                    <div className="w-8 h-8 bg-white/10 rounded-full border border-white/10 overflow-hidden"><img src={`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${i*1000}&size=150x150&format=Png`} alt="A" /></div>
                                                    <div className="flex-1 text-xs font-bold truncate">Agent_Verified_{i}</div>
                                                    <span className="text-[10px] font-black opacity-20">#{i}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'sentinel' && (
                                    <div className="module-scroll-area space-y-4 animate-in">
                                        <div className="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/20 mb-4 text-center">
                                            <h3 className="text-xs font-black uppercase text-blue-400">Amenazas del Kernel</h3>
                                            <p className="text-[7px] opacity-40 mt-1 uppercase">Notificaciones locales con tono melódico</p>
                                        </div>
                                        {intrusions.length === 0 ? (
                                            <div className="tactical-row justify-center opacity-20"><span className="text-[8px] uppercase font-black italic">Sin actividad hostil</span></div>
                                        ) : intrusions.map((log) => (
                                            <div key={log.id} className="tactical-row border-l-2 border-red-500 bg-red-500/5">
                                                <div className="flex-1">
                                                    <p className="text-[9px] font-black uppercase text-red-400">{log.type}</p>
                                                    <p className="text-[6px] opacity-50 truncate">{log.device}</p>
                                                </div>
                                                <span className="text-[8px] font-mono opacity-40">{log.timestamp?.seconds ? new Date(log.timestamp.seconds * 1000).toLocaleTimeString() : '...'}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {activeTab === 'vault' && (
                                    <div className="relative w-full h-full">
                                        {!isVaultUnlocked ? (
                                            <div className="vault-lock-overlay">
                                                <Icon name="cpu" className="w-12 h-12 mb-4 text-white/40 animate-pulse" />
                                                <h3 className="text-sm font-black uppercase italic mb-2 text-center">Protocolo Kinético</h3>
                                                <p className="text-[8px] opacity-40 uppercase font-black text-center">Agita el terminal para abrir</p>
                                            </div>
                                        ) : (
                                            <div className="module-scroll-area flex flex-col items-center justify-center space-y-6 text-center animate-in">
                                                <div className="tactical-row justify-center border-none bg-transparent"><Icon name="roblox_verified" className="w-16 h-16" color="#f9d423" /></div>
                                                <h3 className="text-lg font-black italic uppercase text-yellow-400">Bóveda Abierta</h3>
                                                <button className="py-4 px-10 bg-yellow-500 text-black rounded-xl font-black text-[9px] uppercase shadow-xl w-full">Reclamar Verificado</button>
                                                <button onClick={() => setIsVaultUnlocked(false)} className="text-[7px] opacity-30 font-bold uppercase">Cerrar</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {(activeTab === 'secure' || activeTab === 'admin') && (
                                    <div className="module-scroll-area flex flex-col items-center justify-center space-y-6 animate-in">
                                        <div className="w-full text-center mb-4"><h3 className="text-sm font-black uppercase italic">Biometría Alpha</h3></div>
                                        <div 
                                            className="relative w-32 h-32 rounded-3xl bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden cursor-pointer"
                                            onMouseDown={() => { setIsScanning(true); scanTimerRef.current = setTimeout(() => { setIsUnlocked(true); setIsScanning(false); }, 1500); }} 
                                            onMouseUp={() => { clearTimeout(scanTimerRef.current); setIsScanning(false); }}
                                        >
                                            {isScanning && <div className="absolute inset-0 electric-laser" />}
                                            <Icon name="fingerprint" className={`w-16 h-16 ${isScanning ? 'text-cyan-400' : 'opacity-20'}`} />
                                        </div>
                                        <div className="tactical-row justify-center"><Icon name="shield" className="text-blue-400" /> <span className="text-[9px] uppercase font-black">{isUnlocked ? 'ACCESO TOTAL' : 'IDENTIFICANDO...'}</span></div>
                                    </div>
                                )}

                                {activeTab === 'info' && (
                                    <div className="module-scroll-area space-y-2 animate-in flex flex-col justify-center">
                                        <div className="tactical-row"><span className="flex-1 text-[10px] font-bold uppercase">Diagonal</span><span className="text-[10px] font-mono text-blue-400">6.3" ADAPT</span></div>
                                        <div className="tactical-row"><span className="flex-1 text-[10px] font-bold uppercase">Simetría</span><span className="text-[10px] font-mono text-green-400">ABSOLUTA</span></div>
                                        <div className="tactical-row"><span className="flex-1 text-[10px] font-bold uppercase">Kernel</span><span className="text-[10px] font-mono text-yellow-400">v8.3 MAESTRO</span></div>
                                        <div className="tactical-row"><span className="flex-1 text-[10px] font-bold uppercase">Sound Engine</span><span className="text-[10px] font-mono text-cyan-400">iOS_REBOUND</span></div>
                                    </div>
                                )}

                                {activeTab === 'identity' && (
                                    <div className="module-scroll-area flex flex-col justify-center items-center space-y-6 animate-in">
                                        <div className="vip-card-mockup material-metal"><div className="card-shine"></div><img src="edkultra.svg" className="w-8 h-8 opacity-40" alt="Logo" /><div className="mt-auto"><h3 className="text-sm font-black italic uppercase tracking-tighter">{engravedName}</h3><Icon name="roblox_verified" className="w-6 h-6 ml-auto" /></div></div>
                                        <div className="tactical-row justify-center"><p className="text-[9px] font-black uppercase opacity-50">Acceso: Agente Elite</p></div>
                                    </div>
                                )}

                                {activeTab === 'timer' && (
                                    <div className="module-scroll-area flex flex-col items-center animate-in space-y-4">
                                        <div className="timer-display mb-2">{Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}</div>
                                        <input type="text" value={timerMsg} onChange={(e) => setTimerMsg(e.target.value)} placeholder="MENSAJE PERSONALIZADO..." className="custom-msg-input text-center" />
                                        <div className="grid grid-cols-2 gap-2 w-full">
                                            {[5, 30, 60, 300].map(s => (<button key={s} onClick={() => { if(Notification.permission==="default") Notification.requestPermission(); setTimeLeft(s); setTimerActive(true); playTacticalSound(400,0.1); }} className="tactical-row justify-center py-4 bg-white/5 border border-white/10 active:bg-white/20"><span className="text-[10px] font-bold uppercase">{s<60?`${s} SEG`:`${s/60} MIN`}</span></button>))}
                                        </div>
                                        <button onClick={() => { setTimerActive(false); setTimeLeft(0); }} className="w-full py-4 bg-red-500/10 text-red-400 border border-red-500/20 rounded-2xl font-black uppercase text-[9px]">Cancelar</button>
                                    </div>
                                )}

                                {activeTab === 'light' && (
                                    <div className="module-scroll-area flex flex-col items-center justify-center space-y-8 animate-in text-center">
                                        <div onClick={togglePhysicalTorch} className={`w-20 h-20 rounded-full border-2 border-white flex items-center justify-center cursor-pointer ${torchOn ? 'bg-white text-black shadow-[0_0_40px_white]' : ''}`}><Icon name="bolt" className="w-10 h-10" /></div>
                                        <div className="flex gap-4">
                                            {['#ffffff', '#ff0000', '#00ff00', '#0000ff'].map(c => (<button key={c} onClick={() => { setFlashlightColor(c); playTacticalSound(400, 0.05); }} className="w-8 h-8 rounded-full border border-white/20" style={{ backgroundColor: c }}></button>))}
                                        </div>
                                        <div className="w-full h-10 rounded-lg" style={{ backgroundColor: flashlightColor }}></div>
                                    </div>
                                )}

                                {activeTab === 'laser' && (
                                    <div className="module-scroll-area flex flex-col justify-center space-y-6 animate-in text-center">
                                        <input type="text" value={engravedName} onChange={(e) => setEngravedName(e.target.value.toUpperCase().slice(0, 15))} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-4 font-mono text-center text-sm text-white outline-none focus:border-blue-500" />
                                        <div className="tactical-row justify-center"><p className="text-[7px] text-center opacity-40 uppercase font-black">Chasis grabado correctamente.</p></div>
                                    </div>
                                )}

                                {activeTab === 'rgb' && (
                                    <div className="module-scroll-area flex flex-col items-center justify-center space-y-8 animate-in text-center">
                                        <input type="color" value={dynamicColor} onChange={(e) => setDynamicColor(e.target.value)} className="w-full h-12 bg-transparent cursor-pointer" />
                                        <div className="flex justify-between w-full px-4">{['#00d2ff', '#ff4b2b', '#f9d423', '#00ff41'].map(c => (<button key={c} onClick={() => setDynamicColor(c)} className="w-8 h-8 rounded-full border border-white/20" style={{ backgroundColor: c }}></button>))}</div>
                                    </div>
                                )}

                                {activeTab === 'vision' && (
                                    <div className="relative w-full h-full">
                                        <video ref={videoRef} autoPlay playsInline className={`camera-feed filter-${activeFilter}`}></video>
                                        <div className="absolute bottom-4 left-0 w-full overflow-x-auto scrollbar-hide px-4 flex gap-2 z-30">
                                            {['none', 'neon', 'night', 'thermal', 'pixel', 'glitch'].map(f => (<button key={f} onClick={() => setActiveFilter(f)} className={`filter-button ${activeFilter === f ? 'active' : ''}`}>{f}</button>))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'notifs' && (
                                    <div className="module-scroll-area space-y-4 animate-in">
                                        <div className="notif-card"><span className="text-[8px] font-black text-blue-400 uppercase">Alert Core Sync</span><p className="text-[10px] opacity-60 mt-1">Notificaciones locales activas para intentos de intrusión.</p></div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    <nav className="nav-dock-container">
                        <div className="nav-row">
                            <button onClick={() => handleTabChange('notifs')} className={`nav-btn-wrapper ${activeTab === 'notifs' ? 'active' : ''}`}><Icon name="bell" /></button>
                            <button onClick={() => handleTabChange('timer')} className={`nav-btn-wrapper ${activeTab === 'timer' ? 'active' : ''}`}><Icon name="clock" /></button>
                            <button onClick={() => handleTabChange('laser')} className={`nav-btn-wrapper ${activeTab === 'laser' ? 'active' : ''}`}><Icon name="pen" /></button>
                            <button onClick={() => handleTabChange('sentinel')} className={`nav-btn-wrapper ${activeTab === 'sentinel' ? 'active' : ''}`}><Icon name="shieldAlert" /></button>
                            <button onClick={() => handleTabChange('info')} className={`nav-btn-wrapper ${activeTab === 'info' ? 'active' : ''}`}><Icon name="info" /></button>
                        </div>
                        <div className="nav-row">
                            <button onClick={() => handleTabChange('home')} className={`nav-btn-wrapper ${activeTab === 'home' ? 'active' : ''}`}><Icon name="home" /></button>
                            <button onClick={() => handleTabChange('ranking')} className={`nav-btn-wrapper ${activeTab === 'ranking' ? 'active' : ''}`}><Icon name="roblox_verified" /></button>
                            <button onClick={() => handleTabChange(isOwner ? 'admin' : 'secure')} className={`nav-btn-wrapper master-btn ${isOwner ? 'master-active' : ''} ${(activeTab === 'secure' || activeTab === 'admin') ? 'active' : ''}`}><Icon name={isOwner ? "terminal" : "shield"} color="white" /></button>
                            <button onClick={() => handleTabChange('vault')} className={`nav-btn-wrapper ${activeTab === 'vault' ? 'active' : ''}`}><Icon name="lock" /></button>
                            <button onClick={() => handleTabChange('rgb')} className={`nav-btn-wrapper ${activeTab === 'rgb' ? 'active' : ''}`}><Icon name="palette" /></button>
                            <button onClick={() => handleTabChange('identity')} className={`nav-btn-wrapper ${activeTab === 'identity' ? 'active' : ''}`}><Icon name="id" /></button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
