        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenedor Rígido para evitar expansión */
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            max-width: 410px; 
            background-color: #020617; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box;
        }

        @media (min-width: 640px) { 
            .app-container { 
                border: 12px solid #1e293b; 
                border-radius: 3.5rem; 
                height: 890px; 
            } 
        }

        /* Scroll Suave y bloqueo de rebote */
        .main-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding-bottom: 120px; /* Espacio para el nav absoluto */
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .master-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px); 
            border-radius: 2.5rem; 
            padding: 1.5rem; 
            position: relative; 
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 1.5rem;
            margin-bottom: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .roblox-verified-icon {
            width: 18px;
            height: 18px;
            margin-left: 6px;
            flex-shrink: 0;
        }

        .liquid-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            overflow: hidden;
            border-radius: 2.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .liquid-base {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at center, #0a0f1e 0%, #000 70%);
            transition: transform 0.1s ease-out;
        }

        .liquid-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(40px);
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-stamp {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            opacity: 0.7;
            filter: drop-shadow(0 0 10px var(--accent-color));
            pointer-events: none;
            animation: flicker-logo 3s infinite;
        }

        @keyframes flicker-logo {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.05); }
        }

        .tamper-alert {
            position: fixed;
            inset: 0;
            background: rgba(127, 29, 29, 0.98);
            backdrop-filter: blur(20px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .progress-ring-circle { 
            stroke: var(--accent-color); 
            stroke-width: 4; 
            fill: transparent; 
            stroke-dasharray: 565; 
            stroke-dashoffset: 565; 
            transition: stroke-dashoffset 2s linear; 
        }
        .scanning .progress-ring-circle { stroke-dashoffset: 0; }
    </style>
</head>

                                    <img src="edkultra.svg" className="logo-stamp" alt="Stamp" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'secure' && (
                            <div className="animate-in space-y-6">
                                <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><Icon name="shield" color={activeTheme.color} /> Seguridad</h2>
                                <div className="master-card flex-grow flex flex-col items-center justify-center min-h-[300px]">
                                    {!isUnlocked ? (
                                        <div className="text-center space-y-10">
                                            <div 
                                                className={`relative w-40 h-40 mx-auto rounded-[3.5rem] bg-white/5 border-2 border-white/10 flex items-center justify-center overflow-hidden cursor-pointer transition-all ${isScanning ? 'scale-105 shadow-[0_0_30px_rgba(0,242,255,0.2)]' : 'active:scale-95'}`}
                                                onMouseDown={(e) => { e.preventDefault(); setIsScanning(true); scanTimerRef.current = setTimeout(() => { setIsUnlocked(true); setIsScanning(false); }, 2000); }} 
                                                onTouchStart={(e) => { e.preventDefault(); setIsScanning(true); scanTimerRef.current = setTimeout(() => { setIsUnlocked(true); setIsScanning(false); }, 2000); }} 
                                                onMouseUp={() => { if(scanTimerRef.current) clearTimeout(scanTimerRef.current); setIsScanning(false); }}
                                                onTouchEnd={() => { if(scanTimerRef.current) clearTimeout(scanTimerRef.current); setIsScanning(false); }}
                                            >
                                                <svg className={`progress-ring absolute inset-0 w-full h-full ${isScanning ? 'scanning' : ''}`}><circle className="progress-ring-circle" r="80" cx="80" cy="80" /></svg>
                                                <Icon name="fingerprint" className={`w-20 h-20 transition-all ${isScanning ? 'text-cyan-400 opacity-100' : 'opacity-20'}`} />
                                            </div>
                                            <h3 className="text-sm font-black uppercase italic tracking-widest">{isScanning ? 'Validando...' : 'Mantener Huella'}</h3>
                                        </div>
                                    ) : (
                                        <button onClick={() => setIsUnlocked(false)} className="py-4 px-8 bg-white text-black rounded-2xl font-black text-[10px] uppercase w-full shadow-2xl">Cerrar Bóveda</button>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'identity' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><Icon name="id" color={activeTheme.color} /> Perfil</h2>
                                <div className="master-card bg-gradient-to-br from-purple-600 via-blue-600 to-cyan-500 min-h-[180px] shadow-2xl flex flex-col justify-end">
                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter">{isOwner ? 'MUNEEB_ALY' : 'ULTRA MASTER'}</h3>
                                    <p className="text-[9px] font-bold opacity-60 uppercase tracking-widest mt-1">{isOwner ? 'EDK MASTER OWNER' : 'RECLUTA EDK'}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && isOwner && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black italic uppercase flex items-center gap-3"><Icon name="terminal" color={activeTheme.color} /> Admin</h2>
                                <div className="master-card space-y-4">
                                    <p className="text-[10px] font-black uppercase opacity-50">Noticias Globales</p>
                                    <input type="text" value={newsMessage} onChange={(e) => setNewsMessage(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 font-mono text-xs focus:outline-none text-white shadow-inner" />
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="absolute bottom-0 w-full h-24 bg-slate-950/90 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center px-1 z-[100] safe-bottom flex-shrink-0">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'home' ? '' : 'opacity-40'}`} style={{color: activeTab === 'home' ? activeTheme.color : 'white'}}><Icon name="home" className="w-4 h-4" /><span className="text-[5px] font-black uppercase">Home</span></button>
                        <button onClick={() => setActiveTab('ranking')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'ranking' ? '' : 'opacity-40'}`} style={{color: activeTab === 'ranking' ? activeTheme.color : 'white'}}><Icon name="trophy" className="w-4 h-4" /><span className="text-[5px] font-black uppercase">Elite</span></button>
                        
                        <div className="relative -top-6 flex p-1.5 bg-slate-900/80 backdrop-blur-2xl rounded-[1.8rem] border border-white/10 shadow-2xl">
                            {isOwner ? (
                                <button onClick={() => setActiveTab('admin')} className={`w-11 h-11 rounded-[1.4rem] flex items-center justify-center transition-all ${activeTab === 'admin' ? 'bg-white text-black scale-110 shadow-[0_0_20px_white]' : 'bg-blue-600 text-white'}`}><Icon name="terminal" color={activeTab === 'admin' ? '#000' : '#fff'} /></button>
                            ) : (
                                <button onClick={() => setActiveTab('secure')} className={`w-11 h-11 rounded-[1.4rem] flex items-center justify-center transition-all ${activeTab === 'secure' ? 'bg-white text-black scale-110 shadow-[0_0_20px_white]' : 'bg-slate-800 text-white'}`}><Icon name="shield" color={activeTab === 'secure' ? '#000' : '#fff'} /></button>
                            )}
                        </div>

                        <button onClick={() => setActiveTab('singularity')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'singularity' ? '' : 'opacity-40'}`} style={{color: activeTab === 'singularity' ? activeTheme.color : 'white'}}><Icon name="cpu" className="w-4 h-4" /><span className="text-[5px] font-black uppercase">Liquid</span></button>
                        <button onClick={() => setActiveTab('vision')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'vision' ? '' : 'opacity-40'}`} style={{color: activeTab === 'vision' ? activeTheme.color : 'white'}}><Icon name="camera" className="w-4 h-4" /><span className="text-[5px] font-black uppercase">Vision</span></button>
                        <button onClick={() => setActiveTab('identity')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'identity' ? '' : 'opacity-40'}`} style={{color: activeTab === 'identity' ? activeTheme.color : 'white'}}><Icon name="id" className="w-4 h-4" /><span className="text-[5px] font-black uppercase">Perfil</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
