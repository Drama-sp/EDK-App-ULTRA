<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="app-title">EDK APP ULTRA Pro - v11.7 Fluid Forge</title>
    <link rel="icon" type="image/svg+xml" href="edkultra.svg">
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap');
        :root {
            --gloss-angle: 135deg;
            --dynamic-rgb: #00d2ff;
            --dynamic-rgb-2: #ffffff;
            --rgb-values: 0, 210, 255;
            --pattern-style: linear-gradient(var(--gloss-angle), var(--dynamic-rgb) 0%, var(--dynamic-rgb-2) 100%);
            --gyro-x: 50%; --gyro-y: 50%;
            --border-width: 14px;
            --elastic-scale-x: 1; --elastic-scale-y: 1; --elastic-skew: 0deg;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; margin: 0; overflow: hidden; color: white; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; }
        .app-container { 
            position: relative; width: 100vw; height: 100dvh;
            background-image: linear-gradient(#020617, #020617), var(--pattern-style);
            background-origin: border-box; background-clip: padding-box, border-box;
            border: var(--border-width) solid transparent; border-radius: 2.8rem;
            box-shadow: inset 0 0 30px rgba(0,0,0,1); transition: border-radius 0.4s;
            overflow: hidden; display: flex; flex-direction: column;
        }
        @media (min-width: 1024px) { .app-container { max-width: 395px; max-height: 854px; border-radius: 3.8rem; } }
        .elastic-logo { transition: transform 0.1s ease-out; transform: scale(var(--elastic-scale-x), var(--elastic-scale-y)) skew(var(--elastic-skew)); filter: drop-shadow(0 0 10px var(--dynamic-rgb)); }
        .border-pulse-active { animation: border-glow-pulse 0.6s forwards; }
        @keyframes border-glow-pulse { 30% { filter: brightness(2.5); } 100% { filter: brightness(1); } }
        .tactical-module { width: 100%; height: 420px; background: rgba(0, 0, 0, 0.85); border: 1.5px solid var(--dynamic-rgb); border-radius: 2.2rem; position: relative; overflow: hidden; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .module-scroll-area { flex: 1; overflow-y: auto; padding: 1.25rem; }
        .module-scroll-area::-webkit-scrollbar { display: none; }
        .nav-dock-container { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #020617 90%, transparent); padding: 8px 0 24px 0; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .nav-row { display: flex; justify-content: space-around; width: 100%; padding: 0 0.5rem; }
        .nav-btn-wrapper { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.1rem; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-btn-wrapper.active { background: white; box-shadow: 0 0 15px var(--dynamic-rgb); }
        .nav-btn-wrapper.active svg { stroke: #000; }
        .tamper-alert { position: fixed; inset: 0; background: #450a0a; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; }
        .material-option { padding: 12px; border-radius: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; text-align: center; }
        .material-option.active { background: white; color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", color = "currentColor" }) => {
            const icons = {
                home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
                palette: <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.5 2-1.2" />,
                lock: <path d="M7 11V7a5 5 0 0 1 10 0v4M3 11h18v11H3z" />,
                id: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />,
                sparkles: <path d="M12 3l1.91 5.81L21 12l-7.09 3.19L12 21l-1.91-5.81L3 12l7.09-3.19z" />
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [tamperDetected, setTamperDetected] = useState(false);
            const [color1, setColor1] = useState('#00d2ff');
            const [activeMaterial, setActiveMaterial] = useState('none');

            // --- PROTOCOLO SENTINEL (PROTECCIÓN) ---
            useEffect(() => {
                const triggerSentinel = () => setTamperDetected(true);

                // Detección de DevTools (Cambio de tamaño de ventana interno)
                const checkDev = () => {
                    const diff = 160;
                    if (window.outerWidth - window.innerWidth > diff || window.outerHeight - window.innerHeight > diff) {
                        triggerSentinel();
                    }
                };

                // Bloqueo de Teclas y Clic Derecho
                const handleKey = (e) => {
                    if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                        e.preventDefault();
                        triggerSentinel();
                    }
                };
                
                window.addEventListener('resize', checkDev);
                window.addEventListener('keydown', handleKey);
                window.addEventListener('contextmenu', (e) => e.preventDefault());

                return () => {
                    window.removeEventListener('resize', checkDev);
                    window.removeEventListener('keydown', handleKey);
                };
            }, []);

            // Giroscopio para Logo Elástico
            useEffect(() => {
                const handleMotion = (e) => {
                    const g = e.gamma || 0;
                    const b = e.beta || 0;
                    document.documentElement.style.setProperty('--elastic-scale-x', 1 + Math.abs(g)/200);
                    document.documentElement.style.setProperty('--elastic-scale-y', 1 + Math.abs(b)/200);
                    document.documentElement.style.setProperty('--elastic-skew', `${g/10}deg`);
                };
                window.addEventListener('deviceorientation', handleMotion);
                return () => window.removeEventListener('deviceorientation', handleMotion);
            }, []);

            if (tamperDetected) return (
                <div className="tamper-alert">
                    <Icon name="shield" className="w-20 h-20 mb-4 animate-pulse" color="#ff0000" />
                    <h1 className="text-2xl font-black italic uppercase">Sentinel Breach</h1>
                    <p className="text-[10px] font-mono opacity-60">UNAUTHORIZED ENVIRONMENT DETECTED</p>
                    <button onClick={() => window.location.reload()} className="mt-8 px-8 py-3 bg-white text-black font-black text-[9px] rounded-full">RE-BOOT SYSTEM</button>
                </div>
            );

            return (
                <div className="app-container">
                    <header className="h-20 bg-slate-950/80 backdrop-blur-xl flex items-center justify-between px-6 pt-4 border-b border-white/5">
                        <div>
                            <p className="text-[7px] font-black uppercase tracking-widest text-white/30">Protocol Sentinel Active</p>
                            <h1 className="text-md font-extrabold italic uppercase leading-none">EDK ULTRA</h1>
                        </div>
                        <img src="edkultra.svg" className="w-8 h-8 elastic-logo" />
                    </header>

                    <main className="flex-1 p-6 flex flex-col justify-center">
                        <div className="tactical-module">
                            <div className="module-scroll-area space-y-4">
                                <h2 className="text-lg font-black italic uppercase flex items-center gap-2">
                                    <Icon name="shield" color={color1} /> SENTINEL STATUS
                                </h2>
                                <div className="p-4 bg-white/5 border border-white/10 rounded-2xl">
                                    <p className="text-[10px] font-bold text-green-400 uppercase">● Shield: Active</p>
                                    <p className="text-[10px] font-bold text-blue-400 uppercase">● Anti-Debug: Monitoring</p>
                                    <p className="text-[10px] font-bold text-white/40 uppercase">● Encryption: AES-256 Fluid</p>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="material-option active">Core Secure</div>
                                    <div className="material-option" onClick={() => setActiveTab('rgb')}>Config RGB</div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <nav className="nav-dock-container">
                        <div className="nav-row">
                            <button onClick={() => setActiveTab('home')} className={`nav-btn-wrapper ${activeTab === 'home' ? 'active' : ''}`}><Icon name="home" /></button>
                            <button onClick={() => setActiveTab('rgb')} className={`nav-btn-wrapper ${activeTab === 'rgb' ? 'active' : ''}`}><Icon name="palette" /></button>
                            <button onClick={() => setActiveTab('sentinel')} className={`nav-btn-wrapper ${activeTab === 'sentinel' ? 'active' : ''}`}><Icon name="shield" /></button>
                            <button onClick={() => setActiveTab('vault')} className={`nav-btn-wrapper ${activeTab === 'vault' ? 'active' : ''}`}><Icon name="lock" /></button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
